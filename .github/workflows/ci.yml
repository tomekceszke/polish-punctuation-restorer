name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Smoke test — labelize
        working-directory: src
        run: |
          octave --norc --no-gui --eval "
            addpath('lib');
            [words, labels] = labelize({'hello', 'world,', 'test.'});
            assert(isequal(words, {'hello', 'world', 'test'}));
            assert(isequal(labels, [1, 2, 3]));
            disp('labelize: OK');
          "

      - name: Smoke test — tokenize (writes temp file)
        working-directory: src
        run: |
          octave --norc --no-gui --eval "
            addpath('lib');
            tmp = tempname();
            fid = fopen(tmp, 'w');
            fprintf(fid, 'Ala ma kota, a kot ma Alę.\n');
            fclose(fid);
            tokens = tokenize(tmp);
            assert(length(tokens) > 0);
            delete(tmp);
            disp('tokenize: OK');
          "

      - name: Smoke test — build_vocab
        working-directory: src
        run: |
          octave --norc --no-gui --eval "
            addpath('lib');
            words = {'a','a','a','b','b','c'};
            idx = build_vocab(words, 2);
            assert(idx(1) == 1);
            assert(idx(4) == 2);
            assert(idx(6) == 3);
            disp('build_vocab: OK');
          "
